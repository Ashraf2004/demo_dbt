demo_dbt:
  target: dev # default
  outputs:
    dev:
      type: snowflake
      role: DBT_CICD_ROLE
      warehouse: COMPUTE_WH
      database: POC_DBT_PROJECT
      schema: UTILS
      account: 'your-account-identifier'   # Your Snowflake account
      user: 'your-username'      # Your Snowflake username

    prod:
      type: snowflake
      role: DBT_CICD_ROLE
      warehouse: COMPUTE_WH
      database: POC_DBT_PROJECT
      schema: UTILS
      account: 'not needed'
      user: 'not needed' 

# when you run dbt command the workspace uses the select profile command

