name: Incoming PR
run-name: PR opened by ${{ github.actor }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  run-snowflake-test-dbt-job:
    name: Run dbt CI on PR
    runs-on: ubuntu-latest
    environment: prod

    env:
      SNOWFLAKE_CLI_FEATURES_ENABLE_DBT: true
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}

    steps:

      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Snowflake CLI
      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2
        with:
          use-oidc: true

      # Verify CLI installation
      - name: Check Snowflake CLI version
        run: snow --version

      # Test connection to Snowflake
      - name: Test Snowflake connection
        run: snow connection test -x

      # Deploy dbt project to Snowflake
      - name: Deploy dbt project
        run: |
          snow dbt deploy demo_dbt_project \
          --source . \
          --dbt-version 1.10.15 \
          --force \
          -x

      # List dbt projects in Snowflake
      - name: List Snowflake dbt projects
        run: snow dbt list -x

      # Run dbt models
      - name: Run dbt models
        run: |
          snow dbt execute -x demo_dbt_project run --target dev

      # Run dbt tests
      - name: Run dbt tests
        run: |
          snow dbt execute -x demo_dbt_project test --target dev
